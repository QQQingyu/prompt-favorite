      <rect x="20" y="94" width="220" height="8" rx="4" fill="#334155"/>
      <rect x="20" y="116" width="190" height="8" rx="4" fill="#334155"/>
      <rect x="20" y="148" width="250" height="1" fill="#475569"/>
      <text x="20" y="184" fill="#F8FAFC" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17" font-weight="800">2026-06-22 - PRD Review</text>
      <rect x="20" y="205" width="250" height="64" rx="10" fill="#020617" stroke="#1E293B"/>
      <rect x="36" y="224" width="168" height="7" rx="3.5" fill="#94A3B8"/>
      <rect x="36" y="242" width="210" height="7" rx="3.5" fill="#64748B"/>
