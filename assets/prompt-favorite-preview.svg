<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="88" y1="34" x2="1092" y2="658" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>

  <g opacity="0.6">
    <circle cx="159" cy="100" r="70" fill="#DBEAFE"/>
    <circle cx="1003" cy="586" r="88" fill="#DCFCE7"/>
    <circle cx="1040" cy="108" r="54" fill="#FCE7F3"/>
  </g>

  <g transform="translate(86 72)">
    <text x="0" y="26" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="700">Prompt Favorite</text>
    <text x="0" y="60" fill="#64748B" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">Capture selected text anywhere. Append it to a Markdown prompt collection.</text>
  </g>

  <g transform="translate(84 148)" filter="url(#shadow)">
    <rect width="1032" height="438" rx="22" fill="#FFFFFF" stroke="#D9E2EC"/>
    <rect width="1032" height="54" rx="22" fill="#F8FAFC"/>
    <rect y="43" width="1032" height="11" fill="#F8FAFC"/>
    <circle cx="27" cy="27" r="7" fill="#EF4444"/>
    <circle cx="51" cy="27" r="7" fill="#F59E0B"/>
    <circle cx="75" cy="27" r="7" fill="#22C55E"/>
    <text x="516" y="33" text-anchor="middle" fill="#374151" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Save Prompt</text>

    <g transform="translate(34 86)">
      <text x="0" y="0" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="31" font-weight="800">Save Prompt</text>
      <text x="0" y="36" fill="#64748B" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">Choose where this prompt should be appended.</text>

      <text x="0" y="86" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Title</text>
      <rect x="0" y="99" width="602" height="38" rx="8" fill="#FFFFFF" stroke="#93C5FD" stroke-width="3"/>
      <text x="14" y="124" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17" font-weight="600">PRD Review</text>

      <text x="0" y="170" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Target folder</text>
      <rect x="0" y="183" width="482" height="36" rx="7" fill="#F8FAFC" stroke="#CBD5E1"/>
      <text x="14" y="207" fill="#111827" font-family="SFMono-Regular,Menlo,monospace" font-size="15">~/Documents/Prompt Favorite/Inbox</text>
      <rect x="496" y="183" width="106" height="36" rx="9" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="549" y="206" text-anchor="middle" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Choose...</text>

      <text x="0" y="252" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Prompt</text>
      <rect x="0" y="266" width="602" height="120" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="16" y="294" fill="#111827" font-family="SFMono-Regular,Menlo,monospace" font-size="14">Review this PRD and only point out blocking</text>
      <text x="16" y="318" fill="#111827" font-family="SFMono-Regular,Menlo,monospace" font-size="14">logic issues. Keep the answer concise and</text>
      <text x="16" y="342" fill="#111827" font-family="SFMono-Regular,Menlo,monospace" font-size="14">group findings by severity.</text>
    </g>

    <g transform="translate(700 86)">
